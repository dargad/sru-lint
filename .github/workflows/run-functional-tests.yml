name: sru-lint Functional tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:
    inputs:
      source_ref:
        description: "The git ref (branch/tag/SHA) of sru-lint to test"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout sru-lint
      uses: actions/checkout@v6
      with:
        repository: canonical/sru-lint
        ref: ${{ inputs.source_ref || '' }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Build and install sru-lint
      run: |
        python -m pip install --upgrade pip
        python -m pip install build
        python -m build
        python -m pip install dist/*.whl

    - name: Install test dependencies
      run: |
        pip install pytest pytest-html
        if [ -f test-requirements.txt ]; then pip install -r test-requirements.txt; fi

    - name: Run sru-lint tests
      run: |
        mkdir -p logs
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        pytest tests/functional_tests/ \
          --html=logs/${TIMESTAMP}_sru_lint_report.html \
          --self-contained-html \
          --capture=no \
          -o log_cli=true \
          -o log_cli_level=INFO \
          -v

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: sru-lint-test-report
        path: ./logs/*report.html

    - name: Upload Generated Debdiffs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: sru-lint-generated-debdiffs
        path: tests/functional_tests/generated_debdiffs/
