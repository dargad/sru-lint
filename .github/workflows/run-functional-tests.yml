name: Run Functional Tests
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:
    inputs:
      testing_branch:
        description: "Specify testing branch for functional tests"
        required: true
        default: "main"


jobs:
  get-testing-branch:
    name: 'Extract Testing Branch'
    runs-on: ubuntu-latest

    outputs:
      testing_branch: ${{ steps.extract_branch.outputs.testing_branch }}

    steps:
      # Step 1: Check if PR data is available
      - name: Get PR body
        id: get_pr_body
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v6
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });
            return pr.data.body;

      # Step 2: Extract testing branch value from PR body or use dispatch input
      - name: Extract testing branch
        id: extract_branch
        env:
          PR_BODY: ${{ steps.get_pr_body.outputs.result }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request_target" ]; then
            # Extract testing branch from PR body if triggered by PR
            # look for FUNC-TEST-BRANCH: branch_name, if not found use "main"
            testing_branch=$(printf "%s" "$PR_BODY" | grep -oP 'FUNC-TEST-BRANCH:\s*\K\S+' || echo "main")
            # make sure all whitespace and special chars are removed
            testing_branch=$(echo "$testing_branch" | tr -d '\r\n"' | xargs)
          else
            # Use the workflow_dispatch input as the testing_branch
            testing_branch="${{ github.event.inputs.testing_branch }}"
          fi
          echo "Testing branch: $testing_branch"
          echo "testing_branch=$testing_branch" >> $GITHUB_OUTPUT

  run-tests:
    name: 'Run Functional Tests'
    needs: get-testing-branch
    uses: canonical/seg-testing/.github/workflows/functional_tests_sru_lint.yml@main
    secrets: inherit
    permissions:
      contents: read
    with:
      version: ${{ needs.get-testing-branch.outputs.testing_branch }}
      source_ref: ${{ github.event.pull_request.head.sha || github.sha }}